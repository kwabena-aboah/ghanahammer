services:
  # Django Web Service
  - type: web
    name: ghanahammer
    env: python

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn ghanahammer.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "ghanahammer.onrender.com"

      - key: DATABASE_URL
        sync: false