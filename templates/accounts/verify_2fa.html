{% extends "base/base.html" %}
{% load static %}
{% block title %}Verify 2FA | MachineAuction{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:420px">
  <div class="gh-card p-4 text-center">
    <i class="bi bi-shield-lock-fill fs-1 text-gold d-block mb-3"></i>
    <h5 class="fw-bold mb-1">Two-Factor Verification</h5>
    <p class="text-muted small mb-4">Enter the 6-digit code from your authenticator app.</p>
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      <input type="text" name="otp_code" class="form-control form-control-lg text-center mb-3"
             placeholder="000000" maxlength="6" pattern="[0-9]{6}" autocomplete="one-time-code"
             autofocus required>
      <button type="submit" class="btn gh-btn-sell w-100">Verify</button>
    </form>
  </div>
</div>
{% endblock %}
