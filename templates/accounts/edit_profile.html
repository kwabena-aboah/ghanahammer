{% extends "base/base.html" %}
{% load static %}
{% block title %}Edit Profile | MachineAuction{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:700px">
  <h4 class="fw-bold mb-4"><i class="bi bi-person-gear me-2 text-gold"></i>Edit Profile</h4>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="gh-card p-4 mb-4">
      <h6 class="fw-bold mb-3">Personal Information</h6>
      <div class="mb-3 text-center">
        {% if user.avatar %}<img src="{{ user.avatar.url }}" class="rounded-circle mb-2" width="80" height="80" style="object-fit:cover">{% endif %}
        <div><label class="form-label small text-muted">Profile Photo</label><input type="file" name="avatar" class="form-control form-control-sm" accept="image/*"></div>
      </div>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-semibold small">First Name</label><input type="text" name="first_name" class="form-control" value="{{ user.first_name }}"></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">Last Name</label><input type="text" name="last_name" class="form-control" value="{{ user.last_name }}"></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">Phone</label><input type="tel" name="phone" class="form-control" value="{{ user.phone }}"></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">Company / Business Name</label><input type="text" name="company_name" class="form-control" value="{{ user.company_name }}"></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">Location</label><input type="text" name="location" class="form-control" value="{{ user.location }}"></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">Region</label><input type="text" name="region" class="form-control" value="{{ user.region }}"></div>
        <div class="col-12"><label class="form-label fw-semibold small">Bio</label><textarea name="bio" class="form-control" rows="3">{{ user.bio }}</textarea></div>
      </div>
    </div>
    <div class="gh-card p-4 mb-4">
      <h6 class="fw-bold mb-3">Mobile Money</h6>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label fw-semibold small">MoMo Network</label><select name="momo_network" class="form-select"><option value="">Select network</option><option value="mtn_momo" {% if user.momo_network == 'mtn_momo' %}selected{% endif %}>MTN MoMo</option><option value="telecel_cash" {% if user.momo_network == 'telecel_cash' %}selected{% endif %}>Telecel Cash</option><option value="airteltigo_money" {% if user.momo_network == 'airteltigo_money' %}selected{% endif %}>AirtelTigo Money</option></select></div>
        <div class="col-md-6"><label class="form-label fw-semibold small">MoMo Number</label><input type="tel" name="momo_number" class="form-control" value="{{ user.momo_number }}" placeholder="0241234567"></div>
      </div>
    </div>
    <div class="d-flex gap-3">
      <button type="submit" class="btn gh-btn-sell px-5">Save Profile</button>
      <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
